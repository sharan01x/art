<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>corners-ball</title>
<style>
:root {
  --ink: #111111;
  --ink-alt: #1A1A18;
  --orange: #E74C3C;
  --cream: #F0ECE5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  height: 100%;
  overflow: hidden;
}

body {
  height: 100%;
  background: var(--cream);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  position: relative;
  transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

html.inverted body {
  background: var(--ink);
}

.signature {
  position: absolute;
  user-select: none;
  display: block;
  text-decoration: none;
  z-index: 10;
}

.signature img {
  height: 20px;
  width: auto;
  display: block;
  opacity: 0.25;
  transition: opacity 0.3s ease;
  filter: none;
}

html.inverted .signature img {
  filter: invert(1);
  opacity: 0.35;
}

.signature:hover img {
  opacity: 0.6;
}

html.inverted .signature:hover img {
  opacity: 0.7;
}

#grid {
  display: grid;
  gap: 8px;
}

.cell {
  background: var(--ink);
  transition: border-radius 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}

.cell.red {
  background: var(--orange);
}

html.inverted .cell:not(.red) {
  background: var(--cream);
}
</style>
</head>
<body>
<div id="grid"></div>
<a href="https://github.com/sharan01x/art" target="_blank" rel="noopener noreferrer" class="signature">
  <img src="signature.png" alt="Sharan + Hound">
</a>

<script>
const grid = document.getElementById('grid');
const html = document.documentElement;
const GAP = 8;
const TARGET_CELL = 88;

const availableW = window.innerWidth - 80;
const availableH = window.innerHeight - 80;

const COLS = Math.max(6, Math.floor((availableW + GAP) / (TARGET_CELL + GAP)));
const ROWS = Math.max(6, Math.floor((availableH + GAP) / (TARGET_CELL + GAP)));

const cellSize = Math.floor(Math.min(
  (availableW - (COLS - 1) * GAP) / COLS,
  (availableH - (ROWS - 1) * GAP) / ROWS
));

const gridW = COLS * cellSize + (COLS - 1) * GAP;
const gridH = ROWS * cellSize + (ROWS - 1) * GAP;

grid.style.width = gridW + 'px';
grid.style.height = gridH + 'px';
grid.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
grid.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px)`;

const signature = document.querySelector('.signature');

function positionSignature() {
  const gridRect = grid.getBoundingClientRect();
  const bodyRect = document.body.getBoundingClientRect();
  const sigWidth = signature.offsetWidth || 191;
  const left = gridRect.right - bodyRect.left - sigWidth;
  const top = gridRect.bottom - bodyRect.top + 15;
  signature.style.left = left + 'px';
  signature.style.top = top + 'px';
}

positionSignature();

const sigImg = signature.querySelector('img');
if (sigImg) {
  sigImg.onload = positionSignature;
  if (sigImg.complete) positionSignature();
}
window.addEventListener('load', positionSignature);
window.addEventListener('resize', positionSignature);

const MAX_MERGE = Math.max(COLS, ROWS) >= 20 ? 3 : 2;

const slots = Array(ROWS * COLS).fill(false);

function isFilled(r, c) {
  if (r >= ROWS || c >= COLS) return true;
  return slots[r * COLS + c];
}

function canPlace(r, c, size) {
  if (r + size > ROWS || c + size > COLS) return false;
  for (let i = r; i < r + size; i++) {
    for (let j = c; j < c + size; j++) {
      if (slots[i * COLS + j]) return false;
    }
  }
  return true;
}

function markFilled(r, c, size) {
  for (let i = r; i < r + size; i++) {
    for (let j = c; j < c + size; j++) {
      slots[i * COLS + j] = true;
    }
  }
}

function randomCorners() {
  const tl = Math.random() < 0.5 ? '0%' : '100%';
  const tr = Math.random() < 0.5 ? '0%' : '100%';
  const br = Math.random() < 0.5 ? '0%' : '100%';
  const bl = Math.random() < 0.5 ? '0%' : '100%';
  return `${tl} ${tr} ${br} ${bl}`;
}

function isFullCircle(radius) {
  const parts = radius.split(' ');
  return parts.every(p => p === '100%');
}

function updateColor(cell) {
  if (isFullCircle(cell.style.borderRadius)) {
    cell.classList.add('red');
  } else {
    cell.classList.remove('red');
  }
}

function checkInversion() {
  const hasRed = document.querySelector('.cell.red');
  if (hasRed) {
    html.classList.remove('inverted');
  } else {
    html.classList.add('inverted');
  }
}

const cells = [];

for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    if (isFilled(r, c)) continue;

    let size = 1;
    const roll = Math.random();

    if (MAX_MERGE >= 3 && roll < 0.03 && canPlace(r, c, 3)) {
      size = 3;
    } else if (MAX_MERGE >= 2 && roll < 0.12 && canPlace(r, c, 2)) {
      size = 2;
    }

    markFilled(r, c, size);
    cells.push({ r, c, size });
  }
}

for (let i = cells.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [cells[i], cells[j]] = [cells[j], cells[i]];
}

cells.forEach(({ r, c, size }) => {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.style.gridRow = `${r + 1} / span ${size}`;
  cell.style.gridColumn = `${c + 1} / span ${size}`;
  cell.style.borderRadius = randomCorners();
  updateColor(cell);

  cell.addEventListener('mouseenter', () => {
    cell.style.borderRadius = randomCorners();
    updateColor(cell);
    checkInversion();
  });

  grid.appendChild(cell);
});

// Initial inversion check
checkInversion();
</script>
</body>
</html>
