<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ants</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; overflow: hidden; }
body {
  height: 100%;
  background: #fff;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  position: relative;
  transition: background-color 1.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.disc {
  position: absolute;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffffff 0%, #eeeeee 100%);
  z-index: 1000;
  pointer-events: none;
  box-shadow: 0 2px 24px rgba(0,0,0,0.04);
}

.ant {
  position: absolute;
  border-radius: 50%;
  background: #333;
  z-index: 1;
  pointer-events: none;
}

.signature {
  position: absolute;
  user-select: none;
  display: block;
  text-decoration: none;
  z-index: 10;
}

.signature img {
  height: 20px;
  width: auto;
  display: block;
  opacity: 0.25;
  transition: opacity 0.3s ease;
}

.signature:hover img {
  opacity: 0.6;
}
</style>
</head>
<body>
<div class="disc" id="disc"></div>
<a href="https://github.com/sharan01x/art" target="_blank" rel="noopener noreferrer" class="signature">
  <img src="signature.png" alt="Sharan + Hound">
</a>

<script>
const body = document.body;
const signature = document.querySelector('.signature');

function positionSignature() {
  const sigWidth = signature.offsetWidth || 191;
  signature.style.left = (window.innerWidth - 40 - sigWidth) + 'px';
  signature.style.top = (window.innerHeight - 45) + 'px';
}
positionSignature();
window.addEventListener('resize', positionSignature);

const sigImg = signature.querySelector('img');
if (sigImg) {
  sigImg.onload = positionSignature;
  if (sigImg.complete) positionSignature();
}

const MAX_ANTS = 300;
const DISC_SIZE = 150;
const DISC_RADIUS = DISC_SIZE / 2;

let ants = [];
let isIdle = false;
let idleTimer = null;
let spawnTimer = null;

function centerX() { return window.innerWidth / 2; }
function centerY() { return window.innerHeight / 2; }

function getRandomIdleTimeout() {
  return 5000 + Math.random() * 25000;
}

function goDark() {
  body.style.backgroundColor = '#444';
}

function goLight() {
  body.style.transition = 'none';
  body.style.backgroundColor = '#fff';
  body.offsetHeight; // force reflow
  body.style.transition = 'background-color 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
}

class Ant {
  constructor(confident) {
    this.element = document.createElement('div');
    this.element.className = 'ant';
    this.size = 5 + Math.random() * 20;
    this.element.style.width = this.size + 'px';
    this.element.style.height = this.size + 'px';

    const angle = Math.random() * Math.PI * 2;
    const startRadius = DISC_RADIUS * (0.4 + Math.random() * 0.45);
    this.x = centerX() + Math.cos(angle) * startRadius;
    this.y = centerY() + Math.sin(angle) * startRadius;

    this.speed = 0.4 + Math.random() * 1.2;
    this.state = 'under';
    this.confident = confident;
    this.peeking = false;
    this.pauseUntil = 0;
    this.peekTargetX = 0;
    this.peekTargetY = 0;
    this.targetX = 0;
    this.targetY = 0;
    this.retreatTargetX = 0;
    this.retreatTargetY = 0;

    body.appendChild(this.element);
    this.updatePosition();
  }

  emerge() {
    if (this.state !== 'under') return;
    this.state = 'emerging';

    const cx = centerX();
    const cy = centerY();
    const angle = Math.atan2(this.y - cy, this.x - cx);

    if (!this.confident) {
      const peekDist = DISC_RADIUS + 10 + Math.random() * 25;
      this.peekTargetX = cx + Math.cos(angle) * peekDist;
      this.peekTargetY = cy + Math.sin(angle) * peekDist;
      this.peeking = true;
      this.pauseUntil = Date.now() + 300 + Math.random() * 600;
    }

    const finalDist = DISC_RADIUS + 80 + Math.random() * 350;
    this.targetX = cx + Math.cos(angle) * finalDist;
    this.targetY = cy + Math.sin(angle) * finalDist;

    this.targetX = Math.max(this.size, Math.min(window.innerWidth - this.size, this.targetX));
    this.targetY = Math.max(this.size, Math.min(window.innerHeight - this.size, this.targetY));
  }

  retreat() {
    if (this.state === 'under' || this.state === 'retreating') return;
    this.state = 'retreating';

    const cx = centerX();
    const cy = centerY();
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * DISC_RADIUS * 0.5;
    this.retreatTargetX = cx + Math.cos(angle) * r;
    this.retreatTargetY = cy + Math.sin(angle) * r;
  }

  pickExploreTarget() {
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 300;
    this.targetX = this.x + Math.cos(angle) * dist;
    this.targetY = this.y + Math.sin(angle) * dist;
    this.targetX = Math.max(this.size, Math.min(window.innerWidth - this.size, this.targetX));
    this.targetY = Math.max(this.size, Math.min(window.innerHeight - this.size, this.targetY));
  }

  update() {
    if (this.state === 'under') return true;

    const now = Date.now();

    if (this.state === 'emerging') {
      if (this.peeking && now < this.pauseUntil) {
        return true;
      }

      const tx = this.peeking ? this.peekTargetX : this.targetX;
      const ty = this.peeking ? this.peekTargetY : this.targetY;
      const dx = tx - this.x;
      const dy = ty - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 3) {
        if (this.peeking) {
          this.peeking = false;
          this.pauseUntil = now + 200 + Math.random() * 500;
          return true;
        }
        this.state = 'exploring';
        this.pickExploreTarget();
        return true;
      }

      const speedMult = this.peeking ? 0.25 : 0.6;
      this.x += (dx / dist) * this.speed * speedMult;
      this.y += (dy / dist) * this.speed * speedMult;

    } else if (this.state === 'exploring') {
      const dx = this.targetX - this.x;
      const dy = this.targetY - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 6) {
        this.pickExploreTarget();
      } else {
        const wiggle = 0.25;
        this.x += (dx / dist) * this.speed + (Math.random() - 0.5) * wiggle;
        this.y += (dy / dist) * this.speed + (Math.random() - 0.5) * wiggle;
      }

    } else if (this.state === 'retreating') {
      const dx = this.retreatTargetX - this.x;
      const dy = this.retreatTargetY - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 5) {
        this.remove();
        return false;
      }

      const retreatSpeed = this.speed * 5;
      this.x += (dx / dist) * retreatSpeed;
      this.y += (dy / dist) * retreatSpeed;
    }

    this.updatePosition();
    return true;
  }

  updatePosition() {
    this.element.style.left = (this.x - this.size / 2) + 'px';
    this.element.style.top = (this.y - this.size / 2) + 'px';
  }

  remove() {
    this.element.remove();
  }
}

let spawnedCount = 0;

function spawnAnt(confident) {
  if (spawnedCount >= MAX_ANTS || !isIdle) return;
  const ant = new Ant(confident);
  ant.emerge();
  ants.push(ant);
  spawnedCount++;
}

function startEmergence() {
  spawnedCount = 0;

  function peekWave() {
    if (!isIdle || spawnedCount >= MAX_ANTS) return;
    spawnAnt(false);

    if (spawnedCount < 6) {
      spawnTimer = setTimeout(peekWave, 350 + Math.random() * 500);
    } else if (spawnedCount < 12) {
      spawnTimer = setTimeout(peekWave, 200 + Math.random() * 300);
    } else {
      spawnTimer = setTimeout(confidentWave, 100);
    }
  }

  function confidentWave() {
    if (!isIdle || spawnedCount >= MAX_ANTS) return;
    spawnAnt(true);

    const remaining = MAX_ANTS - spawnedCount;
    const delay = remaining > 100 ? 60 + Math.random() * 40 : remaining > 50 ? 40 + Math.random() * 30 : 25 + Math.random() * 20;
    spawnTimer = setTimeout(confidentWave, delay);
  }

  peekWave();
}

function animate() {
  ants = ants.filter(ant => ant.update());
  requestAnimationFrame(animate);
}

function onActivity() {
  if (isIdle) {
    isIdle = false;
    clearTimeout(idleTimer);
    clearTimeout(spawnTimer);
    goLight();
    ants.forEach(ant => ant.retreat());
  }

  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    isIdle = true;
    goDark();
    startEmergence();
  }, getRandomIdleTimeout());
}

window.addEventListener('mousemove', onActivity);
window.addEventListener('touchstart', onActivity);
window.addEventListener('touchmove', onActivity);

animate();
onActivity();

// ── Audio detection: clap / loud sound sensitivity ──
const AUDIO_THRESHOLD = 0.18;
let audioCtx = null;
let analyser = null;
let dataArray = null;

async function startListening() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.6;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    monitorAudio();
    console.log('Mic active — ants now listen for sound');
  } catch (err) {
    console.log('Mic access denied or unavailable:', err.name);
  }
}

function monitorAudio() {
  if (!analyser) return;
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    sum += dataArray[i];
  }
  const avg = sum / dataArray.length / 255;

  if (avg > AUDIO_THRESHOLD) {
    onActivity();
  }
  requestAnimationFrame(monitorAudio);
}

// First click/press anywhere activates the mic (browser requires user gesture)
document.addEventListener('click', startListening, { once: true });
document.addEventListener('keydown', startListening, { once: true });
</script>
</body>
</html>
